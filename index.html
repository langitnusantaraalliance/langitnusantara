<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langit Nusantara Alliance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.06); }
        #appContainer { background-image: url('https://i.imgur.com/3MnEBgl.jpeg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { overflow-x: hidden; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased flex items-center justify-center p-0 sm:p-4">

    <div class="w-full max-w-md h-[100vh] sm:h-[840px] text-slate-100 flex flex-col justify-between relative overflow-hidden sm:rounded-[40px] sm:shadow-2xl sm:border sm:border-slate-800/60" id="appContainer">
        
        <header class="p-6 flex justify-between items-center z-10 w-full">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-white/30 shadow-lg shrink-0 flex items-center justify-center bg-slate-900">
                    <img src="https://i.imgur.com/Veu95Dk.png" alt="LNA" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent leading-tight">Langit Nusantara<br>Alliance</span>
            </div>
            <div class="flex justify-end">
                <button id="logoutBtn" class="hidden text-slate-400 hover:text-white transition-colors" onclick="handleLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
        </header>

        <div id="toastContainer" class="absolute top-20 left-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

        <main id="authView" class="flex-grow flex flex-col items-center justify-center px-6 relative z-10 fade-in">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-white leading-tight">Welcome to<br>Langit Nusantara</h2>
            </div>
            
            <div class="w-full max-w-xs glass rounded-3xl p-8 shadow-2xl flex flex-col items-center gap-6">
                <div class="text-center w-full">
                    <h1 id="authTitle" class="text-xl font-extrabold text-white">Login</h1>
                    <p id="authSubtitle" class="text-[10px] text-slate-300 font-medium mt-1">Enter your airline credentials</p>
                </div>
                <form id="loginForm" class="w-full flex flex-col gap-4" onsubmit="handleAuthSubmit(event)">
                    <input type="text" id="airlineName" required placeholder="Airline Name" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3 px-4 text-xs text-white placeholder-slate-500 focus:border-cyan-500 outline-none">
                    
                    <div class="relative w-full">
                        <input type="password" id="airlinePassword" required placeholder="Secret Password" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3 pl-4 pr-10 text-xs text-white placeholder-slate-500 focus:border-cyan-500 outline-none">
                        <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-white transition-colors">
                            <i id="eyeIcon" class="fa-solid fa-eye text-xs"></i>
                        </button>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-widest shadow-lg">Login</button>
                </form>
                <div class="text-[9px] text-slate-400 text-center">
                    <span id="toggleText">Don't have an account?</span> 
                    <a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggleBtn" class="text-cyan-400 font-bold hover:underline ml-1">Sign up now</a>
                </div>
            </div>
        </main>
        <!-- PORTAL VIEW -->
        <main id="portalView" class="hidden flex-grow flex flex-col items-center justify-center px-6 relative z-10 fade-in w-full">
            <h2 id="welcomeDisplay" class="text-white text-xl font-bold mb-6 text-center">Welcome,</h2>
            <div class="w-full max-w-xs glass rounded-3xl p-6 shadow-2xl backdrop-blur-md flex flex-col items-center gap-6 text-center">
                
                <div class="text-center">
                    <h1 class="text-lg font-extrabold text-white tracking-wide">Main Menu</h1>
                    <p class="text-[10px] text-slate-300 font-medium mt-1">Please select a service option below</p>
                </div>

                <div class="grid grid-cols-3 gap-4 w-full">
                    
                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center text-white text-xl shadow-lg shadow-cyan-500/10 group-hover:shadow-cyan-500/25 transition-all">
                            <i class="fa-solid fa-chart-simple"></i>
                        </div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase group-hover:text-cyan-400 transition-colors">
                            AOTM
                        </span>
                    </button>

                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-emerald-400 to-teal-600 flex items-center justify-center text-white text-xl shadow-lg shadow-emerald-500/10 group-hover:shadow-emerald-500/25 transition-all">
                            <i class="fa-solid fa-store"></i>
                        </div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase group-hover:text-emerald-400 transition-colors">
                            Market
                        </span>
                    </button>

                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-purple-500 to-pink-600 flex items-center justify-center text-white text-xl shadow-lg shadow-purple-500/10 group-hover:shadow-purple-500/25 transition-all">
                            <i class="fa-solid fa-images"></i>
                        </div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase group-hover:text-purple-400 transition-colors">
                            Gallery
                        </span>
                    </button>
                    
                </div>
            </div>
        </main>

        <footer class="p-6 text-center z-10">
            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-semibold">&copy; Langit Nusantara Alliance</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEy3q03-kvXqazUX4XrvDXCNAXf1nr2js",
            authDomain: "langit-nusantara-alliance.firebaseapp.com",
            projectId: "langit-nusantara-alliance",
            storageBucket: "langit-nusantara-alliance.firebasestorage.app",
            messagingSenderId: "974270939055",
            appId: "1:974270939055:web:12a4f2f789ae13f88cb95a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const authView = document.getElementById('authView');
            const portalView = document.getElementById('portalView');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (user) {
                authView.classList.add('hidden');
                portalView.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                document.getElementById('welcomeDisplay').innerText = "Welcome, " + (user.displayName || "Airline Member");
            } else {
                authView.classList.remove('hidden');
                portalView.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        });

        window.handleAuthSubmit = async function(event) {
            event.preventDefault();
            const name = document.getElementById('airlineName').value.trim();
            const pass = document.getElementById('airlinePassword').value;
            const email = name.toLowerCase().replace(/[^a-z0-9]/g, '') + '@lna.com';

            showToast("Processing...", "info");

            try {
                if (window.currentMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(cred.user, { displayName: name });
                }
            } catch (err) {
                showToast("Auth Error: " + err.message, "error");
            }
        };

        window.handleLogout = () => signOut(auth);
    </script>

    <script>
        window.currentMode = 'login';
        
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('airlinePassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = "password";
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function toggleAuthMode() {
            window.currentMode = (window.currentMode === 'login') ? 'register' : 'login';
            document.getElementById('authTitle').innerText = window.currentMode === 'login' ? "Login" : "Sign Up";
            document.getElementById('submitBtn').innerText = window.currentMode === 'login' ? "Login" : "Register Airline";
            document.getElementById('toggleText').innerText = window.currentMode === 'login' ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleBtn').innerText = window.currentMode === 'login' ? "Sign up now" : "Log in now";
        }

        function showToast(msg, type) {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            const color = type === 'error' ? 'bg-red-500' : (type === 'info' ? 'bg-blue-500' : 'bg-green-500');
            toast.className = `p-4 mb-4 rounded-xl text-white font-bold shadow-lg ${color} transition-all fade-in text-xs`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.togglePasswordVisibility = togglePasswordVisibility;
        window.toggleAuthMode = toggleAuthMode;
        window.showToast = showToast;
    </script>
</body>
</html>
