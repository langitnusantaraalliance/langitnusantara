<!DOCTYPE html>
<html lang="id" class="dark">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] } } }
        }
    </script>
    <style>

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <!-- STREAMING_CHUNK:Rendering Main Container -->
    <div class="w-full min-h-screen text-slate-100 flex flex-col justify-between relative overflow-hidden" id="appContainer">
        
        <header class="p-6 flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-full overflow-hidden border-2 border-white/30 shadow-lg shrink-0 flex items-center justify-center bg-slate-900">
                    <img src="https://i.imgur.com/Veu95Dk.png" alt="LNA" class="w-full h-full object-cover">
                </div>
                <span class="text-xs font-extrabold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent leading-tight">
                    Langit Nusantara<br>Alliance
                </span>
            </div>
        </header>

        <!-- STREAMING_CHUNK:Rendering Portal View -->
        <main id="portalView" class="flex-grow flex flex-col items-center justify-center px-6 relative z-10 fade-in">
            
            <!-- Welcome di luar kotak -->
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold text-white tracking-wide">Welcome</h1>
                <p id="displayName" class="text-lg text-cyan-400 font-bold mt-1">Airline Member</p>
            </div>

            <!-- Kotak Menu Option -->
            <div class="w-full max-w-xs glass rounded-3xl p-8 shadow-2xl backdrop-blur-md flex flex-col items-center gap-6">
                <div class="text-center">
                    <h1 class="text-lg font-extrabold text-white tracking-widest uppercase">Menu Option</h1>
                </div>
                <div class="grid grid-cols-3 gap-6 w-full">
                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center text-white text-2xl shadow-lg shadow-cyan-500/20 group-hover:shadow-cyan-500/40 transition-all"><i class="fa-solid fa-chart-simple"></i></div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase">AOTM</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-emerald-400 to-teal-600 flex items-center justify-center text-white text-2xl shadow-lg shadow-emerald-500/20 group-hover:shadow-emerald-500/40 transition-all"><i class="fa-solid fa-store"></i></div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase">Market</span>
                    </button>
                    <button class="flex flex-col items-center gap-2 group cursor-pointer active:scale-95 transition-transform duration-150">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-500 to-pink-600 flex items-center justify-center text-white text-2xl shadow-lg shadow-purple-500/20 group-hover:shadow-purple-500/40 transition-all"><i class="fa-solid fa-images"></i></div>
                        <span class="text-[10px] font-extrabold text-slate-200 tracking-wider uppercase">Gallery</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- STREAMING_CHUNK:Rendering Footer -->
        <footer class="p-6 text-center z-10">
            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-semibold">&copy; Langit Nusantara Alliance</p>
        </footer>
    </div>

    <!-- STREAMING_CHUNK:Firebase Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAEy3q03-kvXqazUX4XrvDXCNAXf1nr2js",
            authDomain: "langit-nusantara-alliance.firebaseapp.com",
            projectId: "langit-nusantara-alliance",
            storageBucket: "langit-nusantara-alliance.firebasestorage.app",
            messagingSenderId: "974270939055",
            appId: "1:974270939055:web:12a4f2f789ae13f88cb95a"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => {
            if (user) document.getElementById('displayName').innerText = user.displayName || "Airline Member";
        });
    </script>
</body>
</html>
