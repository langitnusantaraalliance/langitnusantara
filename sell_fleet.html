<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#f0f7ff', 500: '#0070f3' } }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f8fafc; }
        .blueprint-grid {
            background-color: #ffffff;
            background-image: linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            background-size: 16px 16px;
        }
        #appContainer *::-webkit-scrollbar { width: 4px; height: 4px; }
        #appContainer *::-webkit-scrollbar-track { background: transparent; margin-top: 16px; margin-bottom: 16px; }
        #appContainer *::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 99px; }
        #appContainer .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center p-0 sm:p-4">

    <div class="w-full max-w-md h-[100vh] sm:h-[840px] bg-white text-gray-900 flex flex-col relative overflow-hidden sm:rounded-[40px] sm:shadow-[0_20px_50px_rgba(0,0,0,0.1)] sm:border sm:border-gray-200" id="appContainer">
        
        <header class="px-4 py-4 flex items-center justify-between border-b border-gray-200 shrink-0 bg-white z-20">
            <button class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 transition-colors active:scale-95"><i class="fa-solid fa-chevron-left text-xl"></i></button>
            <h1 class="text-[17px] font-bold text-gray-800 tracking-tight flex-grow text-center">Fleet Market</h1>
            <button class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 transition-colors active:scale-95"><i class="fa-solid fa-xmark text-xl"></i></button>
        </header>

        <main class="flex-grow overflow-y-auto relative z-0 flex flex-col">
            <div class="w-full h-80 sm:h-96 blueprint-grid relative border-b border-gray-200 flex flex-col justify-between shrink-0">
                <div class="p-3 relative z-30 flex items-start">
                    <div id="filterContainer" class="bg-white/90 backdrop-blur-md rounded-full border border-gray-200 shadow-sm flex items-center overflow-hidden transition-[width] duration-500 w-8 h-8">
                        <button onclick="toggleManufacturerMenu()" class="min-w-[2rem] h-8 flex items-center justify-center text-gray-600 hover:text-brand-600 z-10"><i id="filterIcon" class="fa-solid fa-magnifying-glass text-[13px]"></i></button>
                        <div id="horizontalMenu" class="flex items-center gap-1.5 opacity-0 transition-opacity duration-300 pointer-events-none pl-1 pr-3">
                            <button onclick="selectManufacturer(this, 'Airbus')" class="mfg-opt px-3 py-1 rounded-full text-[12px] font-bold bg-brand-500 text-white">Airbus</button>
                        </div>
                    </div>
                </div>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none px-4 -mt-12">
                    <img id="aircraftImage" src="https://i.imgur.com/63wXR9V.png" class="w-full max-w-[320px] object-contain drop-shadow-md z-10">
                </div>
                <div class="px-4 py-3 flex items-center justify-between mt-auto bg-white/40 backdrop-blur-[2px] z-20 border-t border-black/5">
                    <button onclick="navigateModel(-1)" class="text-gray-500 hover:text-gray-800"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="aircraftName" class="text-[15px] font-semibold text-gray-800 tracking-tight">Airbus A220-100</span>
                    <button onclick="navigateModel(1)" class="text-gray-500 hover:text-gray-800"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="px-5 py-6 space-y-8 pb-28">
                <section>
                    <div class="flex items-center gap-2.5 mb-3">
                        <h3 class="text-[17px] font-bold text-gray-800 tracking-tight">Set Quantity</h3>
                        <span id="availableCount" class="text-[12px] font-medium text-gray-400">Available: 0</span>
                    </div>
                    <div class="bg-[#f8fafc] p-4 rounded-xl border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full bg-brand-50 flex items-center justify-center text-brand-500"><i class="fa-solid fa-handshake text-xl"></i></div>
                                <div>
                                    <span class="text-[12px] text-gray-500 font-semibold block uppercase tracking-wider mb-0.5">Target Buyer</span>
                                    <span id="selectedBuyerText" class="text-lg font-bold text-gray-800 block">Public Market</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-1 shadow-sm">
                                <button onclick="updateQty(-1)" class="w-8 h-8 flex items-center justify-center text-gray-500"><i class="fa-solid fa-minus"></i></button>
                                <input type="text" id="sellQty" value="1" class="w-12 text-center font-bold text-gray-800 bg-transparent outline-none">
                                <button onclick="updateQty(1)" class="w-8 h-8 flex items-center justify-center text-brand-500"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 z-30 pb-6">
            <button onclick="handleListForSale()" class="w-full bg-brand-500 text-white font-bold py-3.5 rounded-xl shadow-[0_8px_16px_rgba(0,112,243,0.25)]">List for Sale</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fleet-market-demo';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentQty = 1;
        let availableStock = 0;

        signInAnonymously(auth).then(() => {
            const stockRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'main');
            
            // Listen for stock changes
            onSnapshot(stockRef, (docSnap) => {
                if (docSnap.exists()) {
                    availableStock = docSnap.data().available || 0;
                    document.getElementById('availableCount').innerText = `Available: ${availableStock}`;
                } else {
                    // Initialize if missing
                    setDoc(stockRef, { available: 0 });
                }
            });
        });

        window.updateQty = (change) => {
            currentQty = Math.max(1, currentQty + change);
            document.getElementById('sellQty').value = currentQty;
        };

        window.handleListForSale = async () => {
            const stockRef = doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'main');
            // When we sell/list, we reduce availability from storage or add to logic
            // Assuming listing for sale reduces inventory, but user requested: "ketika jual bertambah"
            // We interpret as: "Acquiring to sell"
            try {
                await updateDoc(stockRef, {
                    available: increment(currentQty)
                });
                console.log("Updated inventory successfully");
            } catch (e) {
                console.error("Error updating:", e);
            }
        };

        // UI Helpers
        window.toggleManufacturerMenu = () => {};
        window.navigateModel = (step) => {};
    </script>
</body>
</html>
